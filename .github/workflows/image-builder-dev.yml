name: Generate Docker Image Dev

on:
  workflow_run:
    workflows: ["Run Tests"]
    branches:
      - dev
    types:
      - completed
  workflow_dispatch:

env:
  IMG_NAME: selino
  TAG: dev

concurrency:
  group: image-builder-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'dev') }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Extract project version
        uses: saionaro/extract-package-version@v1.3.0
        id: package_ver

      - name: Set Date and Package Version
        run: |
          echo ${{ steps.package_ver.outputs.version }}
          echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: development
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_NAME }}:${{ env.TAG }}-${{ steps.package_ver.outputs.version }}-${{ env.NOW }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMG_NAME }}:${{ env.TAG }}-latest
