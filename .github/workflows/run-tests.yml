name: Run Tests

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - README.md
  workflow_dispatch:

env:
  NODE_VERSION: 24.13.0

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build project
        run: npm run build
