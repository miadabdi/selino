services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: development
    command: npm run start:debug
    ports:
      - "${PORT:-3000}:3000"
      - "9229:9229"
    networks:
      - selino_network
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-selino_user}:${POSTGRES_PASSWORD:-selino_pass}@db:5432/${POSTGRES_DB:-selino}
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-selino_rmq}:${RABBITMQ_PASS:-selino_rmq_pass}@rmq:5672
    volumes:
      - ./:/home/node/app
      - node_modules:/home/node/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      rmq:
        condition: service_healthy
      seaweed_s3:
        condition: service_started

volumes:
  node_modules:
    driver: local
